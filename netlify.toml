[build]
  command = "pnpm build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Netlify Functions (serverless) — /.netlify/functions/<name> routes
# leave their direct path untouched so React Router doesn't intercept.
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA routing — redirect all OTHER paths to index.html so React Router
# can handle deep links like /fr/invite/SAW-DEMO from a cold visit.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-wwPqzA0ZWfbqSj6y58O0xWP4wF3WbZH30uKifyuEwwM='; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://res.cloudinary.com https://cdn.sanity.io; connect-src 'self' https://*.api.sanity.io https://*.apicdn.sanity.io; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    Cross-Origin-Opener-Policy = "same-origin"
